<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Tableau de bord</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/panel.css">
    <link rel="stylesheet" href="css/project.css">
    <link rel="stylesheet" href="css/services.css">
</head>

<body>
  <header>
    <div id="app-name">Tableau de bord</div>
  </header>

  <!--

      === CONTAINER DES PROJETS (CARTES) ===
  -->
  <div id="project-cards-container">

  </div>
     
  
  <pre id="output" class="hidden" style="white-space:pre-wrap"></pre>
  <footer>
    <div id="message">Message footer</div>
    <button onclick="essayer()">Essayer</button>
  </footer>

<!-- 

    === PANNEAU DES SERVICES ===

-->
<div id="services-panel" class="closed">
  
  <fieldset class="services-listing">
    <legend>Liste des services (à glisser-déposer)</legend>
  </fieldset>


  <label>Copier-coller du code</label>
  <textarea id="project-card-editing"></textarea>


  <button onclick="ServicesTools.getInfosFinderWindow.call(ServicesTools)">Information fenêtre Finder</button>
  <button class="btn-close" onclick="Services.close()">Fermer</button>

</div>

<div id="tools">
  <button class="btn-add-project" onclick="Project.addProject()">✚</button>
    <span id="project-buttons" class="invisible">
      <button class="btn-remove-project" onclick="Project.removeProject.call(Project, Project.current)">Retirer le projet</button>
      <button class="btn-deal-with-services" onclick="Services.open.call(Services, Project.current)">Gérer ses services</button>
    </span>
</div>



<script src="js/utils.js"></script>
<script src="js/xbridge.js"></script>
<script src="js/Dom.js"></script>
<script src="js/Panel.js"></script>
<script src="js/Dialogs.js"></script>
<script src="js/Project.js"></script>
<script src="js/Services.js"></script>
<script src="js/ServicesTools.js"></script>
<script src="js/Dashboard.js"></script>
<script src="js/app.js"></script>
<script src="js/ServiceData.js"></script>
<script src="js/ServiceExecuter.js"></script>
<script src="js/ServiceDefiner.js"></script>
</body>
</html>
