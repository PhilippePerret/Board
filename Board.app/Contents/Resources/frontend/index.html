<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Tableau de bord</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
  <header>
    <div id="app-name">Tableau de bord</div>
  </header>

  <!--

      === CONTAINER DES PROJETS (CARTES) ===
  -->
  <div id="project-cards-container">

  </div>
     
  
  <p><button onclick="essayer()">Essayer</button></p>
  <pre id="output" style="white-space:pre-wrap"></pre>
  <footer>
    <div id="message">Message footer</div>
  </footer>

<button onclick="Services.getInfosFinderWindow()">Information fenêtre Finder</button>

<!-- 

    === PANNEAU D'ÉDITION DU PROJET ===

-->
<div id="edit-panel" class="closed">
  <div>
    <label>Titre du projet</label> <input type="text" id="project-title"/>
    <label>Dossier principal</label> <input type="text" id="project-path"/>
  </div>
  <fieldset class="startup-services services">
    <legend>Services au démarrage</legend>
  </fieldset>
  <fieldset class="autres-services services">
    <legend>Autres services</legend>
  </fieldset>

  <label>Copier-coller du code</label>
  <textarea id="project-card-editing"></textarea>


  <button class="btn-close" onclick="Editor.close()">Fermer</button>

</div>

<div id="tools">
  <button class="btn-add-project" onclick="Editor.addProject()">✚</button>
</div>


<script src="Editor.js"></script>
<script src="Project.js"></script>
<script src="Services.js"></script>
<script src="dashboard.js"></script>
  <script src="app.js"></script>
  <script src="xbridge.js"></script>
</body>
</html>
