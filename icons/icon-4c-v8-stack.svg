<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="bg4c" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#e96c1b"/>
      <stop offset="100%" stop-color="#f7c948"/>
    </linearGradient>
  </defs>

  <rect x="20" y="20" width="472" height="472" rx="108" fill="url(#bg4c)"/>

  <!--
    Base v5 (cx=256, losanges isométriques propres) + décalage diagonal 8h→2h (x+y).
    Décalages appliqués aux coordonnées directement (pas de transforms).
    B1(avant)  : Δ(-41,-40) → cx=215, base=406
    B2(milieu) : Δ(-1, 0)  → cx=255, base=366
    B3(arrière): Δ(+40,+40) → cx=296, base=326
    Dessin arrière → avant.
  -->

  <!-- Bloc 3 — ARRIÈRE — bleu — cx=296, base=326, h=140 -->
  <polygon points="296,186 376,146 296,106 216,146" fill="#4a90e2"/>
  <polygon points="216,146 216,286 296,326 296,186" fill="#2471c1"/>
  <polygon points="296,186 376,146 376,286 296,326"  fill="#1a5fa8"/>

  <!-- Bloc 2 — MILIEU — vert — cx=255, base=366, h=35 -->
  <polygon points="255,331 335,291 255,251 175,291" fill="#2ecc71"/>
  <polygon points="175,291 175,326 255,366 255,331" fill="#1fa85b"/>
  <polygon points="255,331 335,291 335,326 255,366" fill="#178c4a"/>

  <!-- Bloc 1 — AVANT — rouge foncé — cx=215, base=406, h=70 -->
  <polygon points="215,336 295,296 215,256 135,296" fill="#e74c3c"/>
  <polygon points="135,296 135,366 215,406 215,336" fill="#a93226"/>
  <polygon points="215,336 295,296 295,366 215,406" fill="#922b21"/>

  <!-- Reflets arêtes frontales -->
  <line x1="296" y1="186" x2="296" y2="326" stroke="rgba(255,255,255,0.35)" stroke-width="1.5"/>
  <line x1="255" y1="331" x2="255" y2="366" stroke="rgba(255,255,255,0.25)" stroke-width="1.5"/>
  <line x1="215" y1="336" x2="215" y2="406" stroke="rgba(255,255,255,0.15)" stroke-width="1.5"/>

</svg>
