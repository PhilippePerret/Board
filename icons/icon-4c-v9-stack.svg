<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="bg4c" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#e96c1b"/>
      <stop offset="100%" stop-color="#f7c948"/>
    </linearGradient>
  </defs>

  <rect x="20" y="20" width="472" height="472" rx="108" fill="url(#bg4c)"/>

  <!--
    Tour entière de v5 pivotée 30° sens horaire autour du centre (256,256).
    30° = angle exact pour l'axe 8h→2h depuis une disposition verticale.
    Les bases gardent leur forme de losange isométrique naturellement.
    Ajuster l'angle ici pour affiner : rotate(XX, 256, 256)
  -->
  <g transform="rotate(30, 256, 256)">

    <!-- Bloc 3 — ARRIÈRE — bleu — h=140 -->
    <polygon points="256,146 336,106 256,66  176,106" fill="#4a90e2"/>
    <polygon points="176,106 176,246 256,286 256,146" fill="#2471c1"/>
    <polygon points="256,146 336,106 336,246 256,286" fill="#1a5fa8"/>

    <!-- Bloc 2 — MILIEU — vert — h=35 -->
    <polygon points="256,331 336,291 256,251 176,291" fill="#2ecc71"/>
    <polygon points="176,291 176,326 256,366 256,331" fill="#1fa85b"/>
    <polygon points="256,331 336,291 336,326 256,366" fill="#178c4a"/>

    <!-- Bloc 1 — AVANT — rouge foncé — h=70 -->
    <polygon points="256,376 336,336 256,296 176,336" fill="#e74c3c"/>
    <polygon points="176,336 176,406 256,446 256,376" fill="#a93226"/>
    <polygon points="256,376 336,336 336,406 256,446" fill="#922b21"/>

    <!-- Reflets arêtes frontales -->
    <line x1="256" y1="146" x2="256" y2="286" stroke="rgba(255,255,255,0.35)" stroke-width="1.5"/>
    <line x1="256" y1="331" x2="256" y2="366" stroke="rgba(255,255,255,0.25)" stroke-width="1.5"/>
    <line x1="256" y1="376" x2="256" y2="446" stroke="rgba(255,255,255,0.15)" stroke-width="1.5"/>

  </g>
</svg>
