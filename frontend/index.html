<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Tableau de bord</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/panel.css">
    <link rel="stylesheet" href="css/project.css">
    <link rel="stylesheet" href="css/services.css">
</head>

<body>
  <header>
    <div id="app-name">Tableau de bord</div>
  </header>

  <!--

      === CONTAINER DES PROJETS (CARTES) ===
  -->
  <div id="project-cards-container">

  </div>
     
  
  <pre id="output" class="hidden" style="white-space:pre-wrap"></pre>
  <footer>
    <div id="message">Message footer</div>
    <button id="btn-try" onclick="essayer()" class="hidden">Essayer</button>
  </footer>

<!-- 

    === PANNEAU DES SERVICES ===

-->
<div id="common-services-panel" class="services-panel closed">
  <fieldset class="services-listing">
    <legend>Services commun</legend>
  </fieldset>
  <button id="btn-close-services-panel" class="btn-close" onclick="Services.close()">Fermer</button>
</div>
<div id="customs-services-panel" class="services-panel closed">
  <fieldset class="services-listing">
    <legend>Services personnalisés</legend>
    <span class="tiny italic">(à glisser-déposer sur le projet)</span>
  </fieldset>
  <button id="btn-close-services-panel" class="btn-close" onclick="Services.close()">Fermer</button>
</div>

<div id="tools">
  <button id="btn-add-project" class="btn-add-project" onclick="Project.addProject()">✚</button>
    <!-- ======= BOUTONS DES PROJETS ============ -->
    <span id="project-buttons" class="invisible">
      <button id="btn-move-project-to-left" class="btn-move-project-to-left" onclick="Project.moveCurrentToLeft()">←</button>
      <button id="btn-move-project-to-right" class="btn-move-project-to-right" onclick="Project.moveCurrentToRight()">→</button>
      <button id="btn-remove-project" class="btn-remove-project" onclick="Project.removeProject.call(Project, Project.current)">Retirer le projet</button>
      <button id="btn-open-services-panel" class="btn-deal-with-services" onclick="Services.toggle.call(Services)">Gérer ses services</button>
    </span>
</div>



<script src="js/utils.js"></script>
<script src="js/xbridge.js"></script>
<script src="js/Dom.js"></script>
<script src="js/Panel.js"></script>
<script src="js/Dialogs.js"></script>
<script src="js/Project.js"></script>
<script src="js/Services.js"></script>
<script src="js/ServicesTools.js"></script>
<script src="js/LOC_ERRORS.js"></script>
<script src="js/LOC_MESSAGES.js"></script>
<script src="js/App.js"></script>
<script src="js/ServiceData.js"></script>
<script src="js/ServiceCommon.js"></script>
<script src="js/ServiceCustom.js"></script>
<script src="js/ServiceExecuter.js"></script>
<script src="js/ServiceDefiner.js"></script>
</body>
</html>
