<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Tableau de bord</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/panel.css">
    <link rel="stylesheet" href="css/project.css">
    <link rel="stylesheet" href="css/services.css">
    <link rel="stylesheet" href="css/clock.css">
</head>

<body>
  <header>
    <div id="app-name">Tableau de bord</div>
    <div id="current-project-mark"></div>
    <div id="tools-button" title="Outils">Outils</div>
    <div id="help-link" title="Aide">Aide</div>
  </header>

  <!--

      === CONTAINER DES PROJETS (CARTES) ===
  -->
  <div id="project-cards-container">

  </div>
     
  
  <pre id="output" class="hidden" style="white-space:pre-wrap"></pre>
<footer>
  <div id="message">Message footer</div>
  <button id="btn-try" onclick="essayer()" class="hidden">Essayer</button>
</footer>

<!-- 

    === PANNEAU DES SERVICES (CUSTOM ET COMMON) ===

-->
<div id="panels-container">
</div>

<div id="tools">
  <button id="btn-add-project" class="btn-add-project" onclick="Project.addProject()">✚</button>
    <!-- ======= BOUTONS DES PROJETS ============ -->
    <span id="project-buttons" class="invisible">
      <button id="btn-remove-project" class="btn-remove-project" onclick="Project.removeCurrentProject.call(Project)">➖</button>
      <button id="btn-move-project-to-left" class="btn-move-project-to-left" onclick="Project.moveCurrentToLeft()">←</button>
      <button id="btn-move-project-to-right" class="btn-move-project-to-right" onclick="Project.moveCurrentToRight()">→</button>
      <button id="btn-deal-project-extradata" class="" onclick="Project.defineExtraData()">Extra Data</button>
    </span>
</div>



<script src="js/MES_ERRORS.js"></script>
<script src="js/MES_MESSAGES.js"></script>
<script src="js/utils.js"></script>
<script src="js/Messagerie.js"></script>
<script src="js/xbridge.js"></script>
<script src="js/Dom.js"></script>
<script src="js/Dialog.js"></script>
<script src="js/SidePanel.js"></script>
<script src="js/SidePanelDefiner.js"></script>
<script src="js/ParamDefiner.js"></script>
<script src="js/Dialogs.js"></script>
<script src="js/ProjectData.js"></script>
<script src="js/ProjectArchives.js"></script>
<script src="js/Project.js"></script>
<script src="js/ProjectExtraData.js"></script>
<script src="js/Service.js"></script>
<script src="js/Clock.js"></script>
<script src="js/ServicesTools.js"></script>
<script src="js/App.js"></script>
<script src="js/AppData.js"></script>
<script src="js/AppDataPanel.js"></script>
<script src="js/ToolsData.js"></script>
<script src="js/Tools.js"></script>
<script src="js/ToolsPanel.js"></script>
<script src="js/ServiceData.js"></script>
<script src="js/ServicePanel.js"></script>
<script src="js/ServiceExecuter.js"></script>
<script src="js/ServiceDefiner.js"></script>
</body>
</html>
